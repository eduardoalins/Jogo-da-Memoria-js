<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Memória - Início</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="config-container">
    <section class="config-card">
      <h1>Jogo da Memória</h1>
      <p class="subtitle">Configure os dois jogadores para começar</p>

      <form id="start-form" class="form-config">
        <div class="players-row">
          <div class="player-box red-side">
            <h2>Jogador 1</h2>
            <label for="jogador1">Nome</label>
            <input
              type="text"
              id="jogador1"
              name="jogador1"
              placeholder="Digite o nome"
              maxlength="20"
              required
            />
            <span class="color-label red-label">Cor: Vermelho</span>
          </div>

          <div class="player-box blue-side">
            <h2>Jogador 2</h2>
            <label for="jogador2">Nome</label>
            <input
              type="text"
              id="jogador2"
              name="jogador2"
              placeholder="Digite o nome"
              maxlength="20"
              required
            />
            <span class="color-label blue-label">Cor: Azul</span>
          </div>
        </div>

        <button type="submit" class="start-button">Iniciar Jogo</button>
      </form>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
